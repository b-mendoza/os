name: Deploy to Production

on:
  workflow_dispatch: null

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"

jobs:
  quality-checks:
    name: Run code quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Setup Node.js, pnpm and dependencies"
        id: setup
        uses: ./.github/actions/setup-env

      - name: "Run linting, formatting and type checks"
        uses: ./.github/actions/code-quality-checks

      - name: Save pnpm store cache
        if: always() && steps.setup.outputs.cache-hit != 'true'
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ${{ steps.setup.outputs.store-path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

  # unit-tests:
  #   name: Run unit tests
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

  #     - name: "Setup Node.js, pnpm and dependencies"
  #       uses: ./.github/actions/setup-env

  #     - name: Run unit tests
  #       uses: ./.github/actions/unit-tests

  deploy:
    name: Deploy to Cloudflare Workers
    needs:
      - quality-checks
      # - unit-tests
    timeout-minutes: 3
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Setup Node.js, pnpm and dependencies"
        uses: ./.github/actions/setup-env

      - name: Build application
        run: pnpm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          accountId: "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
